name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/WebApp/WebApp.csproj -c Release -o ./publish --no-restore

      - name: Zip publish output
        run: cd ./publish && zip -r ../deploy.zip .

      - name: Deploy via Kudu ZIP Deploy
        run: |
          curl -X POST \
            "https://qix-mcp-demo-c6bch3asc3fnbwa9.scm.eastus-01.azurewebsites.net/api/zipdeploy" \
            -u "${{ secrets.AZURE_KUDU_USERNAME }}:${{ secrets.AZURE_KUDU_PASSWORD }}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            --fail
